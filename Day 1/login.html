<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StudyPulse</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="logo">📘 <span>StudyPulse</span></div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to access your learning analytics</p>

      <label>Email</label>
      <div class="input-box">
        <span>📧</span>
        <input type="email" placeholder="you@university.edu" id="email">
      </div>

      <label>Password</label>
      <div class="input-box">
        <span>🔒</span>
        <input type="password" placeholder="••••••••" id="password">
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button id="loginBtn">Log in →</button>

      <p class="signup">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h1>Track Your Progress</h1>
    <p>
      Access detailed analytics on your academic performance and get
      personalized recommendations to improve your weak areas.
    </p>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
